<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ — LETUS Task Watcher</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #6366f1; --text-dark: #0f172a; --text-mid: #475569; --border: #e2e8f0; --bg-pale: #eef2ff; --border-pale: #e0e7ff; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text-dark); background: #fff; line-height: 1.6; font-size: 16px; }
    header { background: #fff; border-bottom: 1px solid var(--border); padding: 14px 20px; }
    header .inner { max-width: 480px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 1rem; font-weight: 900; color: var(--text-dark); text-decoration: none; }
    main { max-width: 480px; margin: 0 auto; padding: 48px 20px 80px; }
    h1 { font-size: 1.5rem; font-weight: 950; margin-bottom: 24px; }
    .card { border: 1px solid var(--border); border-radius: 14px; padding: 20px; margin-bottom: 20px; }
    .card-label { font-size: 0.8rem; color: var(--text-mid); margin-bottom: 4px; }
    .card-value { font-size: 1.05rem; font-weight: 700; margin-bottom: 16px; }
    .status-inactive { background: var(--bg-pale); border-color: var(--border-pale); }
    button { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 999px; font-size: 0.95rem; font-weight: 800; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .register-link { display: inline-block; margin-top: 8px; color: var(--accent); font-weight: 700; }
    .logout-btn { width: auto; background: none; color: var(--text-mid); font-weight: 700; font-size: 0.85rem; padding: 8px 0; text-decoration: underline; }
    .error { background: #fef2f2; color: #dc2626; border-radius: 10px; padding: 10px 14px; font-size: 0.85rem; margin-bottom: 16px; }
    footer { background: #0f172a; color: rgba(255,255,255,0.55); text-align: center; padding: 20px; font-size: 0.82rem; }
    footer a { color: rgba(255,255,255,0.75); }
  </style>
</head>
<body>
<header>
  <div class="inner">
    <a href="index.html" class="logo">LETUS Task Watcher</a>
  </div>
</header>
<main>
  <h1>マイページ</h1>

  <div id="error" class="error" style="display:none;"></div>

  <div id="content"></div>

  <button id="logout-btn" class="logout-btn" type="button">ログアウト</button>
</main>
<footer>
  <a href="index.html">トップページ</a>
  <p style="margin-top:8px;">© 2026 LETUS Task Watcher</p>
</footer>
<script>
  const API_BASE_URL = 'https://api.waiteu.dev'
  const contentEl = document.getElementById('content')
  const errorEl = document.getElementById('error')

  function clearAuthAndRedirect() {
    localStorage.removeItem('authToken')
    localStorage.removeItem('authTokenExpiresAt')
    window.location.href = 'login.html'
  }

  const token = localStorage.getItem('authToken')
  if (!token) {
    clearAuthAndRedirect()
  }

  async function loadStatus() {
    try {
      const res = await fetch(`${API_BASE_URL}/api/subscription/status`, {
        headers: { Authorization: `Bearer ${token}` },
      })

      if (res.status === 401) {
        clearAuthAndRedirect()
        return
      }

      const data = await res.json()

      if (!res.ok) {
        errorEl.textContent = data.error || 'ステータスの取得に失敗しました'
        errorEl.style.display = 'block'
        return
      }

      renderStatus(data)
    } catch {
      errorEl.textContent = 'サーバーに接続できませんでした'
      errorEl.style.display = 'block'
    }
  }

  function renderStatus(data) {
    if (data.status === 'active') {
      const periodEndText = data.currentPeriodEnd
        ? new Date(data.currentPeriodEnd).toLocaleDateString('ja-JP')
        : '不明'

      contentEl.innerHTML = `
        <div class="card">
          <p class="card-label">次回請求日</p>
          <p class="card-value">${periodEndText}</p>
          <button id="portal-btn" type="button">支払い方法を管理</button>
        </div>
      `

      document.getElementById('portal-btn').addEventListener('click', openBillingPortal)
    } else {
      contentEl.innerHTML = `
        <div class="card status-inactive">
          <p class="card-label">サブスクリプション状態</p>
          <p class="card-value">現在サブスクリプションが有効ではありません</p>
          <a class="register-link" href="register.html">サブスクリプションに登録する →</a>
        </div>
      `
    }
  }

  async function openBillingPortal() {
    const btn = document.getElementById('portal-btn')
    btn.disabled = true
    btn.textContent = '処理中...'

    try {
      const res = await fetch(`${API_BASE_URL}/api/subscription/billing-portal`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}` },
      })
      const data = await res.json()

      if (!res.ok || !data.url) {
        errorEl.textContent = data.error || 'カスタマーポータルの取得に失敗しました'
        errorEl.style.display = 'block'
        btn.disabled = false
        btn.textContent = '支払い方法を管理'
        return
      }

      window.location.href = data.url
    } catch {
      errorEl.textContent = 'サーバーに接続できませんでした'
      errorEl.style.display = 'block'
      btn.disabled = false
      btn.textContent = '支払い方法を管理'
    }
  }

  document.getElementById('logout-btn').addEventListener('click', clearAuthAndRedirect)

  if (token) {
    void loadStatus()
  }
</script>
</body>
</html>
